name: Matrix workflow
on: workflow_dispatch

jobs:
  checkout:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
  gather-data:
    runs-on: ubuntu-latest
    outputs:
      values: ${{ steps.diff-files.outputs.components }}
    steps:
      - name: git diff
        id: diff-files
        run: |
          {
            echo '{"foo": 10, "bar": 20}'
            echo '{"foo": 12, "bar": 22}'
          } > components.json
          echo components=$(jq -c --slurp '.' components.json) > $GITHUB_OUTPUT

  dora-integration:
    needs: gather-data
    strategy:
      matrix:
        include: ${{ fromJSON(needs.gather-data.outputs.values) }}
    uses: ./.github/workflows/reusable.yaml
    with:
      foo: ${{ matrix.foo }}
      bar: ${{ matrix.bar }}
